<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DicoArchi - Dictionnaire simple d'architecture</title>
    <meta name="description" content="DicoArchi: dictionnaire simple d'architecture en Suisse romande. Definitions claires pour debutants, normes SIA, chantier, dessin." />
    <meta name="keywords" content="DicoArchi, dictionnaire architecture, SIA, dessinateur, chantier, dessin, Suisse romande" />
    <meta property="og:title" content="DicoArchi - Dictionnaire simple d'architecture" />
    <meta property="og:description" content="Definitions claires pour debutants, normes SIA, chantier, dessin." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dico-archi.vercel.app" />
    <meta property="og:site_name" content="DicoArchi" />
    <meta name="twitter:card" content="summary" />
    <meta name="google-site-verification" content="4NuT9EaeXCrPx51yMmVDvtsuzVJwoauzwHQ5JRzBSjc" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__bg"></div>
      <div class="hero__content">
        <div class="hero__top">
          <div class="badge">Dico Architecture CH</div>
          <button class="menu-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false" data-menu-toggle>
            <span></span><span></span><span></span>
          </button>
          <div class="hero__actions" data-menu-panel>
            <span id="auth-status" class="meta meta--subtle">Non connecté</span>
            <a class="link-button" href="auth.html" id="auth-link">Connexion</a>
            <button class="link-button" id="logout" type="button" hidden>Se déconnecter</button>
            <a class="link-button" href="contribuer.html">Contribuer</a>
            <a class="link-button" href="admin.html" id="admin-link" hidden>Admin</a>
          </div>
        </div>
        <h1>Dictionnaire pratique d’architecture</h1>
        <p>Consultez les termes du dictionnaire par ordre alphabétique.</p>
      </div>
    </header>

    <main>
      <section class="panel">
        <h2>Liste des termes</h2>
        <div id="terms-status" class="meta">Chargement...</div>
        <div id="terms-list" class="cards"></div>
      </section>
    </main>

    <footer>
      <div class="footer__inner">
        <span>Réalisé par RDR Architectes SA.</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="menu.js"></script>
    <script src="nav.js"></script>
    <script>
      const termsStatus = document.getElementById("terms-status");
      const termsList = document.getElementById("terms-list");

      function clearChildren(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function createTermCard(item) {
        const card = document.createElement("article");
        card.className = "card";

        const title = document.createElement("h3");
        title.textContent = item.term;

        const category = document.createElement("p");
        category.className = "meta meta--subtle";
        category.textContent = item.categories?.name || "Sans categorie";

        const definition = document.createElement("p");
        definition.textContent = item.definition || "Definition indisponible.";

        const link = document.createElement("a");
        link.className = "link-button";
        link.href = `term.html?slug=${encodeURIComponent(item.slug)}`;
        link.textContent = "Ouvrir la fiche";

        card.appendChild(title);
        card.appendChild(category);
        card.appendChild(definition);
        card.appendChild(link);
        return card;
      }

      async function loadTerms() {
        if (!window.DicoArchiApi) {
          termsStatus.textContent = "Configuration Supabase manquante.";
          return;
        }

        try {
          const items = await window.DicoArchiApi.fetchPublishedTermsBasic();
          clearChildren(termsList);

          if (!items.length) {
            termsStatus.textContent = "Aucun terme publie.";
            return;
          }

          termsStatus.textContent = `${items.length} terme(s) charge(s).`;
          for (const item of items) {
            termsList.appendChild(createTermCard(item));
          }
        } catch (error) {
          termsStatus.textContent = `Erreur: ${error.message}`;
        }
      }

      loadTerms();
    </script>
    <script src="chatbot.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
