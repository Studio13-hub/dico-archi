<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Explorer les categories - DicoArchi</title>
    <meta name="description" content="Explorer les categories du dictionnaire DicoArchi." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__bg"></div>
      <div class="hero__content">
        <div class="hero__top">
          <div class="badge">Explorer</div>
          <div class="hero__actions">
            <a class="link-button" href="index.html">Accueil</a>
            <a class="link-button" href="dictionnaire.html">Dictionnaire</a>
          </div>
        </div>
        <h1>Explorer les categories</h1>
        <p>Choisissez un domaine pour parcourir les termes associes.</p>
      </div>
    </header>

    <main>
      <section class="panel">
        <div id="categories-status" class="meta">Chargement des categories...</div>
        <div id="categories-grid" class="cards"></div>
      </section>
    </main>

    <footer>
      <div class="footer__inner">
        <span>Réalisé par RDR Architectes SA.</span>
      </div>
    </footer>

    <script>
      const statusNode = document.getElementById("categories-status");
      const gridNode = document.getElementById("categories-grid");

      function clearChildren(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function createCategoryCard(item) {
        const card = document.createElement("article");
        card.className = "card";

        const title = document.createElement("h3");
        title.textContent = item.name;

        const description = document.createElement("p");
        description.textContent = item.description || "Explorer les termes de cette categorie.";

        const meta = document.createElement("div");
        meta.className = "meta meta--subtle";
        meta.textContent = item.slug ? `Slug: ${item.slug}` : "Categorie";

        const link = document.createElement("a");
        link.className = "link-button";
        link.href = `category.html?slug=${encodeURIComponent(item.slug)}`;
        link.textContent = "Explorer les termes";

        card.appendChild(title);
        card.appendChild(description);
        card.appendChild(meta);
        card.appendChild(link);
        return card;
      }

      async function loadCategories() {
        try {
          const response = await fetch("/api/categories");
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "categories_fetch_failed");
          }

          const categories = Array.isArray(payload.categories) ? payload.categories : [];
          clearChildren(gridNode);

          if (!categories.length) {
            statusNode.textContent = "Aucune categorie disponible.";
            return;
          }

          statusNode.textContent = `${categories.length} categorie(s) disponible(s).`;
          for (const item of categories) {
            gridNode.appendChild(createCategoryCard(item));
          }
        } catch (error) {
          statusNode.textContent = `Erreur: ${error.message || "internal_error"}`;
        }
      }

      loadCategories();
    </script>
  </body>
</html>
