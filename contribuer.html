<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contribuer - Dico Architecture CH</title>
    <meta name="description" content="Proposer un terme pour le dictionnaire." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__bg"></div>
      <div class="hero__content">
        <div class="hero__top">
          <div class="badge">Dico Architecture CH</div>
          <button class="menu-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false" data-menu-toggle>
            <span></span><span></span><span></span>
          </button>
          <div class="hero__actions" data-menu-panel>
            <span class="meta meta--subtle" data-nav-status>Non connecté</span>
            <a class="link-button" href="dictionnaire.html">Dictionnaire</a>
            <a class="link-button" href="contribuer.html">Contribuer</a>
            <a class="link-button" href="auth.html" data-nav-auth>Connexion</a>
            <a class="link-button" href="admin.html" data-nav-admin hidden>Admin</a>
            <button class="link-button" type="button" data-nav-logout hidden>Se déconnecter</button>
          </div>
        </div>
        <h1>Proposer un terme</h1>
        <p>Le terme sera enregistré dans les soumissions en attente de validation.</p>
      </div>
    </header>

    <main class="auth">
      <section class="panel">
        <form id="contrib-form" novalidate>
          <div class="auth__inputs">
            <input id="term" type="text" placeholder="Terme" />
            <select id="category">
              <option value="">Choisir une catégorie</option>
            </select>
            <textarea id="definition" placeholder="Définition"></textarea>
            <textarea id="example" placeholder="Exemple"></textarea>
          </div>
          <div class="auth__actions">
            <button id="submit" type="submit">Envoyer</button>
          </div>
        </form>
        <div id="contrib-message" class="auth__message"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="menu.js"></script>
    <script src="nav.js"></script>
    <script src="contribuer.page.js"></script>
    <script src="chatbot.js"></script>
  </body>
</html>
