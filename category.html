<!doctype html>
<html lang="fr">

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__bg"></div>
      <div class="hero__content">
        <div class="hero__top">
          <div class="badge">Par catégorie</div>
          <button class="menu-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false" data-menu-toggle>
            <span></span><span></span><span></span>
          </button>
          <div class="hero__actions" data-menu-panel>
            <span class="meta meta--subtle" data-nav-status>Public · consultation</span>
            <a class="link-button" href="dictionnaire.html">Dictionnaire</a>
            <a class="link-button" href="category.html">Catégories</a>
            <a class="link-button" href="games.html">Jeux</a>

            <a class="link-button" href="admin.html" data-nav-admin hidden>Admin</a>

        </div>
        <h1 id="category-title">Catégorie</h1>
        <p id="category-subtitle">Chargement...</p>
      </div>
    </header>

    <main>
      <section class="panel">
        <div id="category-breadcrumb" class="meta"></div>
        <div class="category-toolbar">
          <div class="category-toolbar__item">
            <span class="dashboard__label">Vue</span>
            <strong id="category-count">-</strong>
          </div>
          <div class="category-toolbar__item">
            <span class="dashboard__label">Parcours</span>
            <strong id="category-mode">Index des domaines</strong>
          </div>
        </div>
        <div id="category-cards" class="cards"></div>
      </section>
    </main>

    <script src="chatbot.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="tracker.js"></script>
    <script src="menu.js"></script>
    <script src="nav.js"></script>
    <script src="category.js"></script>
